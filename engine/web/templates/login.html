<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>BerryDoctor Login</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #f0f4ef, #e3ece7); color: #213128; }
    .card { width: min(420px, calc(100vw - 32px)); background: white; border-radius: 18px; padding: 24px; box-shadow: 0 16px 40px rgba(0,0,0,0.12); }
    input { width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #cad4cd; border-radius: 12px; margin: 10px 0 16px; }
    button { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #21563f; color: white; cursor: pointer; }
    .muted { color: #607166; font-size: 13px; }
    .error { margin-bottom: 14px; padding: 10px 12px; border-radius: 10px; background: #fdecea; color: #8b2d2d; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin-top: 0;">대시보드 로그인</h1>
    <p class="muted">접근 토큰은 실행 폴더의 <code>runtime/dashboard-access.txt</code>에 저장됩니다.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="access_token">Access Token</label>
      <input id="access_token" type="password" name="access_token" autocomplete="current-password" autofocus>
      <button type="submit">로그인</button>
    </form>
  </div>
</body>
</html>
